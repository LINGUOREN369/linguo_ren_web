<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0b1220"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:0.5" />
    </linearGradient>

    <!-- Subtle dots pattern -->
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#e7e5e4" opacity="0.1"/>
    </pattern>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e7e5e4;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#e7e5e4;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e7e5e4;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grad1)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Modern accent bar -->
  <rect x="80" y="280" width="6" height="150" fill="url(#accent)" rx="3"/>

  <!-- Main content -->
  <g>
    <!-- Name - larger and more prominent -->
    <text x="120" y="320"
          font-family="Source Serif 4, Georgia, serif"
          font-size="90"
          font-weight="700"
          fill="#e2e8f0"
          text-anchor="start"
          letter-spacing="-1">
      Linguo Ren
    </text>

    <!-- Role/Description - cleaner -->
    <text x="120" y="385"
          font-family="Source Sans 3, Arial, sans-serif"
          font-size="32"
          font-weight="400"
          fill="#94a3b8"
          text-anchor="start">
      Software Engineer × Data Scientist
    </text>

    <!-- URL - bottom corner -->
    <text x="120" y="530"
          font-family="Source Sans 3, Arial, sans-serif"
          font-size="24"
          font-weight="500"
          fill="#64748b"
          text-anchor="start">
      linguoren.com
    </text>
  </g>

  <!-- Abstract geometric elements - modern touch -->
  <circle cx="950" cy="200" r="120" fill="#1f2937" opacity="0.4"/>
  <circle cx="1000" cy="450" r="80" fill="#1f2937" opacity="0.3"/>
  <rect x="850" y="150" width="200" height="200" fill="#1f2937" opacity="0.15" rx="12"/>
</svg>
