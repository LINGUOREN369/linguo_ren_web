<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0b1220"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:0.8" />
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#grad1)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="#e7e5e4" opacity="0.6"/>

  <!-- Accent line bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="#e7e5e4" opacity="0.6"/>

  <!-- Main content -->
  <g>
    <!-- Name -->
    <text x="600" y="240"
          font-family="Source Serif 4, Georgia, serif"
          font-size="72"
          font-weight="700"
          fill="#e2e8f0"
          text-anchor="middle"
          letter-spacing="1">
      Linguo Ren
    </text>

    <!-- Title -->
    <text x="600" y="320"
          font-family="Source Sans 3, Arial, sans-serif"
          font-size="38"
          font-weight="400"
          fill="#94a3b8"
          text-anchor="middle"
          letter-spacing="2">
      PROFESSIONAL PORTFOLIO
    </text>

    <!-- Decorative element -->
    <line x1="400" y1="360" x2="800" y2="360"
          stroke="#e7e5e4"
          stroke-width="2"
          opacity="0.4"/>

    <!-- Subtitle/tagline -->
    <text x="600" y="420"
          font-family="Source Sans 3, Arial, sans-serif"
          font-size="26"
          font-weight="400"
          fill="#64748b"
          text-anchor="middle"
          letter-spacing="1">
      Software Engineer • Data Scientist • Researcher
    </text>

    <!-- URL -->
    <text x="600" y="520"
          font-family="Source Sans 3, Arial, sans-serif"
          font-size="22"
          font-weight="500"
          fill="#e7e5e4"
          text-anchor="middle"
          opacity="0.7">
      linguoren.com
    </text>
  </g>

  <!-- Corner accent elements -->
  <circle cx="100" cy="100" r="60" fill="#1f2937" opacity="0.3"/>
  <circle cx="1100" cy="530" r="80" fill="#1f2937" opacity="0.3"/>
</svg>
